name: Build UK ecommerce storefront

on:
  push:
    branches:
      - agent/uk-ecommerce-store
    paths:
      - .github/workflows/build-uk-store.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/uk-ecommerce-store
          fetch-depth: 0

      - name: Generate and validate UK storefront
        run: python .github/scripts/build_uk_store.py

      - name: Remove temporary builder files
        run: |
          rm .github/scripts/build_uk_store.py
          rm .github/workflows/build-uk-store.yml

      - name: Commit generated storefront
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uk.html .github/scripts/build_uk_store.py .github/workflows/build-uk-store.yml
          git commit -m "Rebuild UK store as ecommerce storefront"
          git push origin HEAD:agent/uk-ecommerce-store
