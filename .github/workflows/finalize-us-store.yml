name: Finalize and validate US storefront

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "us-catalogue.html"
      - "us-*.html"
      - "cart.html"
      - "checkout.html"
      - "shipping-delivery-policy.html"
      - "returns-refunds-policy.html"
      - "privacy-policy.html"
      - "terms-conditions.html"
      - "contact-and-order-help.html"
      - "assets/us-products.js"
      - "assets/us-commerce.js"
      - "assets/us-catalogue.js"
      - ".github/scripts/finalize_us_store.py"
      - ".github/workflows/finalize-us-store.yml"

permissions:
  contents: write

concurrency:
  group: finalize-us-store-main
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Finalize and validate storefront
        run: python .github/scripts/finalize_us_store.py

      - name: Commit finalized static pages
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No static storefront changes were required."
            exit 0
          fi
          git config user.name "omni-terrain-store-bot"
          git config user.email "actions@users.noreply.github.com"
          git add us-catalogue.html us-*.html
          git commit -m "Finalize static US storefront pages"
          git push origin main
